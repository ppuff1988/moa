name: CI Test

on:
  pull_request:
    branches: [dev, main]
  # 移除 push 觸發，避免在直接 push 到 dev 時觸發整個 workflow 鏈
  # PR 合併前已經執行過 CI，不需要在合併後再次執行
  # push:
  #   branches: [dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  test-api:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.TEST_DB_USER || 'moa_test_user' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME || 'moa_test_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: 初始化測試資料庫
        env:
          PGPASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER || 'moa_test_user' }}:${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}@localhost:5432/${{ secrets.TEST_DB_NAME || 'moa_test_db' }}
        run: |
          # 等待資料庫完全就緒
          echo "⏳ 等待資料庫就緒..."
          sleep 3

          echo "📦 執行資料庫初始化腳本..."
          psql -h localhost -U ${{ secrets.TEST_DB_USER || 'moa_test_user' }} -d ${{ secrets.TEST_DB_NAME || 'moa_test_db' }} -f migrations/init_database.sql

          echo "🔄 執行資料庫 migrations..."
          npm run db:migrate

          echo "✅ 驗證表結構..."
          psql -h localhost -U ${{ secrets.TEST_DB_USER || 'moa_test_user' }} -d ${{ secrets.TEST_DB_NAME || 'moa_test_db' }} -c "\dt"

          echo "📋 驗證關鍵欄位..."
          echo "=== users 表結構 ==="
          psql -h localhost -U ${{ secrets.TEST_DB_USER || 'moa_test_user' }} -d ${{ secrets.TEST_DB_NAME || 'moa_test_db' }} -c "\d users"
          echo "=== game_players 表結構 ==="
          psql -h localhost -U ${{ secrets.TEST_DB_USER || 'moa_test_user' }} -d ${{ secrets.TEST_DB_NAME || 'moa_test_db' }} -c "\d game_players"
          echo "=== schema_migrations (migration 追蹤) ==="
          psql -h localhost -U ${{ secrets.TEST_DB_USER || 'moa_test_user' }} -d ${{ secrets.TEST_DB_NAME || 'moa_test_db' }} -c "SELECT * FROM schema_migrations ORDER BY id"

      - name: 建置應用程式
        run: npm run build
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER || 'moa_test_user' }}:${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}@localhost:5432/${{ secrets.TEST_DB_NAME || 'moa_test_db' }}

      - name: 啟動測試伺服器
        run: npm run start:test &
        env:
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER || 'moa_test_user' }}:${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}@localhost:5432/${{ secrets.TEST_DB_NAME || 'moa_test_db' }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'test-secret-key-for-testing-only' }}

      - name: 等待伺服器啟動
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: 執行 API 測試
        run: npm run test:api
        env:
          CI: true
          DATABASE_URL: postgresql://${{ secrets.TEST_DB_USER || 'moa_test_user' }}:${{ secrets.TEST_DB_PASSWORD || 'moa_test_pass' }}@localhost:5432/${{ secrets.TEST_DB_NAME || 'moa_test_db' }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'test-secret-key-for-testing-only' }}
          API_BASE_URL: http://localhost:5173

  notify:
    name: 測試通知
    runs-on: ubuntu-latest
    needs: [lint, test-api]
    # 只在測試失敗時通知
    if: always() && (needs.lint.result == 'failure' || needs.test-api.result == 'failure')
    steps:
      - name: 📣 發送測試失敗通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *CI 測試失敗*

            *專案:* `${{ github.repository }}`
            *分支:* `${{ github.head_ref || github.ref_name }}`
            *觸發者:* `${{ github.actor }}`
            *事件:* `${{ github.event_name }}`

            *失敗項目:*
            ${{ needs.lint.result == 'failure' && '• ❌ Lint 檢查失敗' || '' }}
            ${{ needs.test-api.result == 'failure' && '• ❌ API 測試失敗' || '' }}

            [立即查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
