# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CD

on:
  workflow_run:
    workflows: ['CI Release'] # 確保這個名稱和 CI Release workflow 名稱完全相同
    types:
      - completed
  workflow_dispatch: # 支援手動觸發部署
    inputs:
      version:
        description: '部署版本號'
        required: false
        type: string
      tag:
        description: '部署標籤'
        required: false
        type: string
  release: # 當 GitHub Release 創建時觸發
    types: [published]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-production:
    name: 部署到生產環境
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: 📦 讀取部署版本
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "ℹ️ 使用手動指定版本: $VERSION"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "ℹ️ 使用 Release 版本: $VERSION"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "ℹ️ 從 package.json 讀取版本: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 準備部署版本: $VERSION"

      - name: 🔐 設定 SSH 金鑰
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "📝 寫入 SSH 金鑰..."
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "🔍 驗證金鑰格式..."
          if ! ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "⚠️ 金鑰格式可能有問題，嘗試修復..."
            # 移除可能的 Windows 換行符號
            dos2unix ~/.ssh/deploy_key 2>/dev/null || sed -i 's/\r$//' ~/.ssh/deploy_key
          fi

          echo "✅ 金鑰權限已設定為 600"
          ls -la ~/.ssh/deploy_key

          echo "🔑 添加 SSH known_hosts..."
          ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>  /dev/null

          echo "✅ SSH 設定完成"

      - name: 🚀 部署到伺服器
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          PUBLIC_GTM_ID: ${{ vars.PUBLIC_GTM_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME }}
          DEPLOY_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euxo pipefail

          KEY_PATH=~/.ssh/deploy_key
          # SSH 使用 -p 參數指定端口
          SSH_OPTS=(-i "$KEY_PATH" -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 -o ServerAliveCountMax=3)
          # SCP 使用 -P 參數（大寫）指定端口
          SCP_OPTS=(-i "$KEY_PATH" -P "${DEPLOY_PORT}" -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 -o ServerAliveCountMax=3)

          # 在 Runner 本機產生安全的 .env 檔
          ENV_FILE=$(mktemp)
          cleanup() { rm -f "$ENV_FILE"; }
          trap cleanup EXIT

          escape_squotes() {
            # 將單引號轉為可在單引號字串中表示的序列：' → '\''
            sed "s/'/'\"'\"'/g" <<< "$1"
          }

          write_kv() {
            local key="$1"
            local val="$2"
            local esc
            esc=$(escape_squotes "$val")
            printf "%s='%s'\n" "$key" "$esc" >> "$ENV_FILE"
          }

          echo "⚙️ 產生 .env 檔案 (本機)"
          : > "$ENV_FILE"
          write_kv DOCKER_USERNAME "$DOCKER_USERNAME"
          write_kv DATABASE_URL "$DATABASE_URL"
          write_kv JWT_SECRET "$JWT_SECRET"
          write_kv JWT_EXPIRES_IN "30d"
          write_kv POSTGRES_USER "$POSTGRES_USER"
          write_kv POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
          write_kv POSTGRES_DB "$POSTGRES_DB"
          write_kv NODE_ENV "production"
          write_kv PUBLIC_GTM_ID "$PUBLIC_GTM_ID"
          write_kv GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          write_kv GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
          write_kv GOOGLE_REDIRECT_URI "$GOOGLE_REDIRECT_URI"
          write_kv DEPLOY_URL "$DEPLOY_URL"
          write_kv SMTP_HOST "$SMTP_HOST"
          write_kv SMTP_PORT "$SMTP_PORT"
          write_kv SMTP_SECURE "$SMTP_SECURE"
          write_kv SMTP_USER "$SMTP_USER"
          write_kv SMTP_PASSWORD "$SMTP_PASSWORD"
          write_kv SMTP_FROM_EMAIL "$SMTP_FROM_EMAIL"
          write_kv SMTP_FROM_NAME "$SMTP_FROM_NAME"

          echo "📤 上傳 .env 到遠端伺服器..."
          scp "${SCP_OPTS[@]}" "$ENV_FILE" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

          max_attempts=3
          attempt=1

          echo "🚀 開始部署版本: $DEPLOY_VERSION"

          while [ $attempt -le $max_attempts ]; do
            echo "🔄 嘗試連線 (第 $attempt/$max_attempts 次)..."
            if ssh "${SSH_OPTS[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "bash -lc '
              set -euo pipefail
              cd "$DEPLOY_PATH"
              echo "📥 拉取最新代碼..."
              git pull origin main
              echo "🚀 執行部署腳本（包含 migrations）..."
              ./deploy-prod.sh
            '"; then
              echo "✅ 部署成功！版本: $DEPLOY_VERSION"
              exit 0
            fi

            echo "❌ 部署失敗，10 秒後重試..."
            sleep 10
            attempt=$((attempt + 1))
          done

          echo "❌ 達到最大重試次數，部署失敗！"
          exit 1

      - name: 🏥 健康檢查
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          max_attempts=10
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "嘗試 $attempt/$max_attempts..."
            if curl -fsS "$DEPLOY_URL/api/health" > /dev/null; then
              echo "✅ 健康檢查通過！"
              exit 0
            fi
            echo "⏳ 等待服務啟動..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "❌ 健康檢查失敗！"
          exit 1

      - name: 🧹 清理 SSH 金鑰
        if: always()
        run: shred -u ~/.ssh/deploy_key

  notify:
    name: 發送部署通知
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📦 讀取版本
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📣 發送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *部署通知*

            *狀態:* ${{ needs.deploy-production.result == 'success' && '✅ 成功' || '❌ 失敗' }}
            *專案:* `${{ github.repository }}`
            *版本:* `${{ steps.get_version.outputs.version }}`
            *觸發方式:* `${{ github.event_name == 'release' && 'Release 發布' || github.event_name == 'workflow_run' && 'CI Release 完成' || '手動觸發' }}`
            *提交者:* `${{ github.actor }}`

            [查看工作流程](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
